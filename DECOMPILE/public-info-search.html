<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recherche Adresses</title>
  <style>
    :root { --bg: #f0fdf4; --panel: #fff; --ink: #052e16; --muted: #4b6358; --line: #bbf7d0; --green: #047857; --green-dark: #065f46; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif; background: var(--bg); color: var(--ink); }
    header { display: flex; justify-content: space-between; align-items: center; gap: 14px; padding: 18px clamp(18px, 4vw, 54px); background: var(--panel); border-bottom: 1px solid var(--line); }
    .brand { font-weight: 900; color: var(--green-dark); }
    nav, .links { display: flex; gap: 10px; flex-wrap: wrap; }
    a, button { min-height: 42px; padding: 0 14px; border: 1px solid var(--line); border-radius: 8px; background: white; color: var(--green-dark); font: inherit; font-weight: 800; text-decoration: none; display: inline-flex; align-items: center; cursor: pointer; }
    button { background: var(--green); color: white; border-color: var(--green); }
    main { width: min(1000px, calc(100% - 32px)); margin: 0 auto; padding: 70px 0; }
    .panel { background: white; border: 1px solid var(--line); border-radius: 8px; padding: 28px; box-shadow: 0 16px 34px rgba(4, 120, 87, .08); }
    h1 { font-size: clamp(38px, 7vw, 72px); line-height: .96; margin: 0 0 18px; color: var(--green-dark); }
    p { color: var(--muted); font-size: 18px; }
    form { display: grid; grid-template-columns: 1fr auto; gap: 12px; margin-top: 24px; }
    input { min-height: 46px; border: 1px solid var(--line); border-radius: 8px; padding: 0 14px; font: inherit; background: white; color: var(--ink); }
    .results { display: grid; gap: 14px; margin-top: 18px; }
    .card { background: white; border: 1px solid var(--line); border-radius: 8px; padding: 18px; display: grid; gap: 8px; }
    .card h2 { margin: 0; }
    .muted { color: var(--muted); }
    .gmail-auth { display: flex; align-items: end; justify-content: space-between; gap: 14px; margin-bottom: 18px; padding: 14px 16px; border-radius: 8px; background: white; border: 1px solid var(--line); flex-wrap: wrap; }
    .gmail-auth-copy { display: grid; gap: 3px; }
    .gmail-auth-copy span, .gmail-auth-error { color: var(--muted); font-size: 14px; }
    .gmail-auth-form { display: flex; gap: 10px; flex: 1 1 360px; justify-content: flex-end; flex-wrap: wrap; }
    .gmail-auth-form input { flex: 1 1 240px; }
    @media (max-width: 760px) { header { align-items: stretch; flex-direction: column; } form { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div class="brand">Recherche Adresses</div>
    <nav>
      <a href="app.html">Back</a>
      <a href="database.html">Data Base</a>
    </nav>
  </header>
  <main>
    <section class="gmail-auth" data-gmail-auth></section>
    <section class="panel">
      <h1>Adresses</h1>
      <form id="addressSearch">
        <input id="addressQuery" placeholder="Ex: 10 rue de Rivoli Paris" autocomplete="off">
        <button>Rechercher</button>
      </form>
      <div id="addressResults" class="results"></div>
    </section>
  </main>

  <script type="module" src="firebase-auth.js"></script>
  <script>
    const addressResults = document.querySelector("#addressResults");
    const addressQuery = document.querySelector("#addressQuery");

    document.querySelector("#addressSearch").addEventListener("submit", async (event) => {
      event.preventDefault();
      const query = addressQuery.value.trim();
      if (!query) return;
      addressResults.innerHTML = `<article class="card"><h2>Recherche...</h2><p class="muted">Consultation de l'API publique adresse.data.gouv.fr.</p></article>`;
      try {
        const response = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(query)}&limit=8`);
        if (!response.ok) throw new Error("API indisponible");
        const payload = await response.json();
        renderAddresses(payload.features || []);
      } catch (error) {
        addressResults.innerHTML = `<article class="card"><h2>Erreur</h2><p class="muted">Impossible de charger les adresses pour le moment.</p></article>`;
      }
    });

    function renderAddresses(features) {
      if (!features.length) {
        addressResults.innerHTML = `<article class="card"><h2>Aucun resultat</h2><p class="muted">Essaie une adresse plus precise.</p></article>`;
        return;
      }
      addressResults.innerHTML = features.map(feature => {
        const p = feature.properties;
        const [lon, lat] = feature.geometry.coordinates;
        const label = p.label || "Adresse inconnue";
        const maps = `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`;
        const cadastre = `https://cadastre.data.gouv.fr/map?search=${encodeURIComponent(label)}`;
        const sirene = `https://annuaire-entreprises.data.gouv.fr/rechercher?terme=${encodeURIComponent(label)}`;
        return `
          <article class="card">
            <h2>${label}</h2>
            <div class="muted">Commune : ${p.city || "inconnue"} - Code postal : ${p.postcode || "inconnu"}</div>
            <div>GPS : ${lat.toFixed(6)}, ${lon.toFixed(6)}</div>
            <div>Score : ${Math.round((p.score || 0) * 100)}%</div>
            <div class="links">
              <a href="${maps}" target="_blank" rel="noopener">Carte</a>
              <a href="${cadastre}" target="_blank" rel="noopener">Cadastre public</a>
              <a href="${sirene}" target="_blank" rel="noopener">Entreprises a cette adresse</a>
            </div>
          </article>
        `;
      }).join("");
    }
  </script>
</body>
</html>
