<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Base</title>
  <style>
    :root {
      --bg: #ecfdf5;
      --panel: #ffffff;
      --ink: #052e16;
      --muted: #4b6358;
      --line: #bbf7d0;
      --green: #047857;
      --green-dark: #065f46;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif; background: linear-gradient(180deg, var(--bg), #f7fff9); color: var(--ink); }
    header { display: flex; justify-content: space-between; align-items: center; gap: 14px; padding: 18px clamp(18px, 4vw, 54px); background: white; border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 2; }
    .brand { font-weight: 900; color: var(--green-dark); }
    nav { display: flex; gap: 10px; flex-wrap: wrap; }
    a, button { min-height: 42px; padding: 0 14px; border: 1px solid var(--line); border-radius: 8px; background: white; color: var(--green-dark); font: inherit; font-weight: 800; text-decoration: none; display: inline-flex; align-items: center; cursor: pointer; }
    button { background: var(--green); color: white; border-color: var(--green); }
    main { width: min(1120px, calc(100% - 32px)); margin: 0 auto; padding: 34px 0 60px; }
    h1 { font-size: clamp(38px, 7vw, 74px); line-height: .95; margin: 10px 0 18px; color: var(--green-dark); }
    p { color: var(--muted); font-size: 18px; }
    .tag { display: inline-flex; width: fit-content; padding: 5px 9px; border-radius: 999px; background: #dcfce7; color: var(--green-dark); font-size: 12px; font-weight: 900; }
    .search { display: grid; grid-template-columns: repeat(3, 1fr) auto; gap: 12px; margin: 26px 0; background: white; border: 1px solid var(--line); border-radius: 8px; padding: 18px; }
    input, select { min-height: 46px; border: 1px solid var(--line); border-radius: 8px; padding: 0 14px; font: inherit; background: white; color: var(--ink); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; margin-top: 18px; }
    .card { background: white; border: 1px solid var(--line); border-radius: 8px; padding: 18px; box-shadow: 0 16px 34px rgba(4, 120, 87, .08); display: grid; gap: 8px; }
    .card h2 { margin: 0; }
    .muted { color: var(--muted); }
    .field { display: grid; grid-template-columns: 130px 1fr; gap: 8px; }
    .field span { color: var(--muted); font-weight: 800; }
    .notice { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 16px; margin-top: 16px; }
    .gmail-auth { display: flex; align-items: end; justify-content: space-between; gap: 14px; margin-bottom: 18px; padding: 14px 16px; border-radius: 8px; background: white; border: 1px solid var(--line); flex-wrap: wrap; }
    .gmail-auth-copy { display: grid; gap: 3px; }
    .gmail-auth-copy span, .gmail-auth-error { color: var(--muted); font-size: 14px; }
    .gmail-auth-form { display: flex; gap: 10px; flex: 1 1 360px; justify-content: flex-end; flex-wrap: wrap; }
    .gmail-auth-form input { flex: 1 1 240px; }
    @media (max-width: 980px) { .search { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 760px) { header { align-items: stretch; flex-direction: column; } .search, .field { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div class="brand">Data Base</div>
    <nav>
      <a href="public-info-search.html">Adresses</a>
      <a href="app.html">Workspace</a>
    </nav>
  </header>
  <main>
    <section class="gmail-auth" data-gmail-auth></section>
    <span class="tag">Recherche publique autorisee</span>
    <h1>Recherche de personnes</h1>
    <form class="search" id="peopleSearch">
      <input id="firstName" placeholder="Prenom" autocomplete="off">
      <input id="lastName" placeholder="Nom" autocomplete="off">
      <input id="birthDate" type="date" title="Date de naissance">
      <button>Rechercher</button>
    </form>

    <section id="results" class="grid"></section>
  </main>

  <script type="module" src="firebase-auth.js"></script>
  <script>
    const results = document.querySelector("#results");

    document.querySelector("#peopleSearch").addEventListener("submit", async (event) => {
      event.preventDefault();
      const fullName = toTitleName(`${document.querySelector("#firstName").value} ${document.querySelector("#lastName").value}`);
      if (!fullName) return;
      results.innerHTML = `<article class="card"><span class="tag">Recherche</span><h2>${fullName}</h2><p class="muted">Consultation des sources ouvertes autorisees...</p></article>`;
      try {
        const [wikidata, companies] = await Promise.all([
          searchWikidata(fullName).catch(() => []),
          searchCompanies().catch(() => [])
        ]);
        render(fullName, filterPrecise([...wikidata, ...companies]));
      } catch (error) {
        render(fullName, []);
      }
    });

    async function searchWikidata(fullName) {
      const safeName = fullName.replaceAll('"', '\\"');
      const query = `
        SELECT ?person ?personLabel ?description ?birth ?birthPlaceLabel ?genderLabel ?occupationLabel ?employerLabel WHERE {
          SERVICE wikibase:mwapi {
            bd:serviceParam wikibase:endpoint "www.wikidata.org";
              wikibase:api "EntitySearch";
              mwapi:search "${safeName}";
              mwapi:language "fr".
            ?person wikibase:apiOutputItem mwapi:item.
          }
          ?person wdt:P31 wd:Q5.
          OPTIONAL { ?person schema:description ?description FILTER(LANG(?description) = "fr") }
          OPTIONAL { ?person wdt:P569 ?birth. }
          OPTIONAL { ?person wdt:P19 ?birthPlace. }
          OPTIONAL { ?person wdt:P21 ?gender. }
          OPTIONAL { ?person wdt:P106 ?occupation. }
          OPTIONAL { ?person wdt:P108 ?employer. }
          SERVICE wikibase:label { bd:serviceParam wikibase:language "fr,en". }
        }
        LIMIT 12
      `;
      const url = `https://query.wikidata.org/sparql?format=json&query=${encodeURIComponent(query)}`;
      const response = await fetch(url, { headers: { "Accept": "application/sparql-results+json" } });
      if (!response.ok) throw new Error("source indisponible");
      const payload = await response.json();
      return payload.results.bindings.map(row => ({
        source: "Wikidata",
        label: row.personLabel?.value || fullName,
        description: row.description?.value || "Profil public reference",
        lastName: lastNameOf(row.personLabel?.value || fullName),
        firstName: firstNameOf(row.personLabel?.value || fullName),
        gender: row.genderLabel?.value || "Non renseigne",
        birth: row.birth?.value ? new Date(row.birth.value).toLocaleDateString("fr-FR") : "Non renseignee",
        birthPlace: row.birthPlaceLabel?.value || "Non renseigne",
        role: row.occupationLabel?.value || "Non renseignee",
        company: row.employerLabel?.value || "Non renseignee"
      }));
    }

    async function searchCompanies() {
      const firstName = document.querySelector("#firstName").value.trim();
      const lastName = document.querySelector("#lastName").value.trim();
      const birthDate = document.querySelector("#birthDate").value;
      const params = new URLSearchParams({
        nom_personne: lastName,
        prenoms_personne: firstName,
        include: "dirigeants,siege",
        per_page: "10"
      });
      if (birthDate) {
        params.set("date_naissance_personne_min", birthDate);
        params.set("date_naissance_personne_max", birthDate);
      }
      const response = await fetch(`https://recherche-entreprises.api.gouv.fr/search?${params.toString()}`, {
        headers: { "Accept": "application/json" }
      });
      if (!response.ok) throw new Error("API Entreprises indisponible");
      const payload = await response.json();
      const rows = payload.results || payload.resultats || [];
      return rows.map((row) => {
        const dirigeant = findLeader(row, firstName, lastName);
        const siege = row.siege || row.matching_etablissements?.[0] || {};
        const companyName = row.nom_complet || row.nom_raison_sociale || row.denomination || row.nom_entreprise || "Entreprise referencee";
        const address = [siege.numero_voie, siege.type_voie, siege.libelle_voie].filter(Boolean).join(" ");
        return {
          source: "API Recherche d'Entreprises",
          label: dirigeant?.nom_complet || `${firstName} ${lastName}`.trim(),
          description: "Dirigeant, elu ou partie prenante d'entreprise diffusee publiquement",
          lastName: dirigeant?.nom || lastName || "Non renseigne",
          firstName: dirigeant?.prenoms || firstName || "Non renseigne",
          gender: dirigeant?.genre || dirigeant?.sexe || "Non renseigne",
          birth: dirigeant?.date_naissance ? formatIsoDate(dirigeant.date_naissance) : "Non renseignee",
          birthPlace: "Non renseigne",
          role: dirigeant?.qualite || dirigeant?.fonction || "Dirigeant / partie prenante",
          company: `${companyName}${row.siren ? " - SIREN " + row.siren : ""}${row.siret ? " - SIRET " + row.siret : ""}`,
          address: address || siege.adresse || "Adresse non renseignee",
          city: siege.libelle_commune || siege.commune || "Ville non renseignee",
          postalCode: siege.code_postal || "Code postal non renseigne"
        };
      });
    }

    function findLeader(row, firstName, lastName) {
      const leaders = row.dirigeants || row.complements?.dirigeants || row.personnes || [];
      const f = firstName.toLowerCase();
      const l = lastName.toLowerCase();
      return leaders.find((leader) =>
        String(leader.nom || "").toLowerCase().includes(l) &&
        String(leader.prenoms || leader.prenom || "").toLowerCase().includes(f)
      ) || leaders[0];
    }

    function render(fullName, people) {
      if (!people.length) {
        results.innerHTML = `
          <article class="card">
            <span class="tag">Aucun profil public</span>
            <h2>${fullName}</h2>
          <p class="muted">Aucun profil trouve dans Wikidata ni dans l'API Recherche d'Entreprises pour ces criteres.</p>
          </article>
        `;
        return;
      }
      results.innerHTML = people.map(person => `
        <article class="card">
          <span class="tag">${person.source || "Profil public"}</span>
          <h2>${person.label}</h2>
          <p class="muted">${person.description}</p>
          <div class="field"><span>Nom</span><div>${person.lastName}</div></div>
          <div class="field"><span>Prenom</span><div>${person.firstName}</div></div>
          <div class="field"><span>Genre</span><div>${person.gender}</div></div>
          <div class="field"><span>Naissance</span><div>${person.birth}</div></div>
          <div class="field"><span>Lieu naissance</span><div>${person.birthPlace}</div></div>
          <div class="field"><span>Fonction</span><div>${person.role}</div></div>
          <div class="field"><span>Societe</span><div>${person.company}</div></div>
          ${person.address ? `<div class="field"><span>Adresse pro</span><div>${person.address}</div></div>` : ""}
          ${person.postalCode ? `<div class="field"><span>Code postal</span><div>${person.postalCode}</div></div>` : ""}
          ${person.city ? `<div class="field"><span>Ville</span><div>${person.city}</div></div>` : ""}
        </article>
      `).join("");
    }

    function filterPrecise(people) {
      const birthDate = document.querySelector("#birthDate").value;
      return people.filter(person =>
        (!birthDate || sameDate(person.birth, birthDate))
      );
    }

    function sameDate(displayDate, isoDate) {
      const date = new Date(isoDate);
      return displayDate === date.toLocaleDateString("fr-FR");
    }

    function formatIsoDate(value) {
      if (/^\\d{4}-\\d{2}-\\d{2}$/.test(value)) return new Date(value).toLocaleDateString("fr-FR");
      if (/^\\d{4}-\\d{2}$/.test(value)) return value.split("-").reverse().join("/");
      return value;
    }

    function toTitleName(value) {
      return value.toLowerCase().split(/\s+/).filter(Boolean).map(part => part.charAt(0).toUpperCase() + part.slice(1)).join(" ");
    }
    function firstNameOf(value) {
      const parts = value.trim().split(/\s+/);
      return parts[0] || "Non renseigne";
    }
    function lastNameOf(value) {
      const parts = value.trim().split(/\s+/);
      return parts.length > 1 ? parts.slice(1).join(" ") : "Non renseigne";
    }
  </script>
</body>
</html>
