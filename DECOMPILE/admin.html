<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="styles.css?v=font20260606">
</head>
<body>
  <main class="app-shell">
    <nav class="top-nav">
      <a class="page-link" href="app.html">Workspace</a>
      <a class="page-link" href="community.html">Community</a>
      <a class="page-link" href="post.html">Post</a>
      <a class="page-link" href="pet-icon-maker.html">Pet Icons</a>
      <a class="page-link" href="store.html">Shop</a>
      <a class="page-link" href="orders.html">My Orders</a>
      <a class="page-link" href="adminOrders.html">Admin Orders</a>
      <a class="page-link" href="adminShop.html">Admin Shop</a>
      <a id="adminNavLink" class="page-link active" href="admin.html" hidden>Admin</a>
      <button id="toggleTheme" class="page-link page-link-button" type="button">Dark mode</button>
    </nav>

    <section class="gmail-auth" data-gmail-auth></section>

    <section class="hero">
      <p class="eyebrow">Local • Admin • Moderation</p>
      <h1>Admin Panel</h1>
    </section>

    <section id="adminAccessNotice" class="panel share-page admin-lock-card">
      <h3>Admin access required</h3>
      <button id="adminLoginButton" class="ghost-button" type="button">Unlock admin</button>
    </section>

    <section id="adminPanel" class="admin-grid" hidden>
      <section class="panel share-page">
        <div class="share-header">
          <div>
            <h3>Posts</h3>
          </div>
          <span id="postCountBadge" class="history-pill">0 posts</span>
        </div>
        <div id="adminPostsBoard" class="share-board empty-list">No posts found.</div>
      </section>

      <section class="panel share-page">
        <div class="share-header">
          <div>
            <h3>Store products</h3>
          </div>
          <span id="productCountBadge" class="history-pill">0 products</span>
        </div>
        <div id="adminProductsBoard" class="share-board empty-list">No products found.</div>
      </section>
    </section>
  </main>

  <div id="scriptModal" class="modal-overlay" hidden>
    <div class="modal-card modal-script-card">
      <div class="modal-header">
        <h3 id="modalTitle">Shared script</h3>
        <div class="modal-header-actions">
          <button id="copyModalCode" class="ghost-button" type="button">Copy code</button>
          <button id="closeModal" class="ghost-button" type="button">Close</button>
        </div>
      </div>
      <pre id="modalCode" class="code-block code-panel modal-script-code"></pre>
    </div>
  </div>
  <div id="toast" class="toast" aria-live="polite" hidden></div>
  <script type="module" src="firebase-auth.js"></script>
  <script src="auth-fallback.js"></script>
  <script src="script-admin.js"></script>
</body>
</html>
