<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claim Reward</title>
  <link rel="stylesheet" href="styles.css?v=lusive-store">
  <style>
    .claim-card { display: grid; gap: 16px; padding: 24px; margin-top: 28px; border-radius: 14px; }
    .claim-card h1 { margin: 0; font-size: clamp(2.2rem, 5vw, 4rem); }
    .claim-meta { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .claim-meta div { padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.04); }
    .claim-meta span { display: block; color: #98a6ba; font-size: 0.78rem; font-weight: 900; text-transform: uppercase; }
    .claim-file { color: #61f0ff; overflow-wrap: anywhere; font-family: Consolas, "Cascadia Code", monospace; }
    .claim-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .claim-error { color: #ffb7b7; }
    .claim-status { color: #61f0ff; font-weight: 900; }
    @media (max-width: 640px) { .claim-meta { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="app-shell">
    <nav class="top-nav">
      <a class="page-link" href="store.html">Shop</a>
      <a class="page-link" href="orders.html">My Orders</a>
      <a class="page-link" href="adminOrders.html">Admin Orders</a>
      <a class="page-link" href="adminShop.html">Admin Shop</a>
      <a class="page-link" href="adminKeys.html">Admin Keys</a>
    </nav>
    <section class="gmail-auth" data-gmail-auth></section>

    <section id="claimContent" class="panel claim-card"></section>
  </main>

  <script type="module" src="firebase-auth.js"></script>
  <script src="auth-fallback.js"></script>
  <script>
    const STORE_ORDERS_KEY = "lusive-store-orders";
    const CLAIM_CUSTOMER_EMAIL_KEY = "lusive-customer-email";
    const CLAIM_PROBLEM_ENDPOINT = "https://skylixfm-shop.solarydigix.workers.dev/admin-order";
    const DEFAULT_REWARD_FILE = "rewards/[] Adopt Me! (Decompile).rbxl";
    const params = new URLSearchParams(location.search);
    const orderId = params.get("id") || "";

    function getOrders() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORE_ORDERS_KEY) || "[]");
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function normalizeEmail(email) {
      return String(email || "").trim().toLowerCase();
    }

    function getCustomerEmail() {
      return window.gmailAuth?.getEmail?.() || normalizeEmail(localStorage.getItem(CLAIM_CUSTOMER_EMAIL_KEY));
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function reportProblem(orderId) {
      const order = getOrders().find((entry) => entry.id === orderId);
      if (!order) return;
      const reason = prompt("Explain the issue to open a Discord ticket:");
      if (reason === null || !reason.trim()) return;
      fetch(CLAIM_PROBLEM_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ order, status: "problem", reason: reason.trim() })
      }).then(() => {
        document.querySelector("#claimProblemStatus").textContent = "Issue sent to Discord.";
      }).catch(() => {
        document.querySelector("#claimProblemStatus").textContent = "Unable to send the issue.";
      });
    }

    function copyAccountDelivery(orderId) {
      const order = getOrders().find((entry) => entry.id === orderId);
      if (!order) return;
      const login = order.deliveryLogin || order.deliveryAccounts || "";
      const password = order.deliveryPassword || "";
      navigator.clipboard.writeText(`Email/username: ${login}\nPassword: ${password}`);
    }

    function copyScriptDelivery(orderId) {
      const order = getOrders().find((entry) => entry.id === orderId);
      if (!order) return;
      const product = (order.products || [])[0] || {};
      const location = order.scriptLocation || product.scriptLocation || "ReplicatedStorage";
      const scriptClass = order.scriptClass || product.scriptClass || "ModuleScript";
      navigator.clipboard.writeText(`Location: ${location}\nScript class: ${scriptClass}`);
    }

    function renderClaim() {
      const order = getOrders().find((entry) => entry.id === orderId);
      const content = document.querySelector("#claimContent");

      if (!order) {
        content.innerHTML = `<h1>Reward not found</h1><p class="claim-error">Unknown order.</p>`;
        return;
      }

      if (order.status !== "accepted") {
        content.innerHTML = `<h1>Reward locked</h1><p class="claim-error">This order has not been accepted yet.</p>`;
        return;
      }

      if (normalizeEmail(order.customerEmail) && normalizeEmail(order.customerEmail) !== getCustomerEmail()) {
        content.innerHTML = `<h1>Reward locked</h1><p class="claim-error">Sign in with the Gmail used for this order.</p><div class="claim-actions"><a class="ghost-button" href="orders.html">Back to My Orders</a></div>`;
        return;
      }

      const product = (order.products || [])[0] || {};
      const assignedKeys = Array.isArray(order.assignedKeys) ? order.assignedKeys : [];
      const hasAccountDelivery = product.fulfillment === "account"
        || Boolean(order.deliveryLogin)
        || Boolean(order.deliveryPassword)
        || String(order.deliveryAccounts || "").toLowerCase().includes("mot de passe")
        || String(order.deliveryAccounts || "").toLowerCase().includes("email/username")
        || String(order.deliveryAccounts || "").toLowerCase().includes("mail/pseudo");

      if (hasAccountDelivery) {
        const login = order.deliveryLogin || order.deliveryAccounts || "";
        const password = order.deliveryPassword || "";
        content.innerHTML = `
          <p class="eyebrow">Account available</p>
          <h1>Claim Account</h1>
          <div class="claim-meta">
            <div><span>Order ID</span>${escapeHtml(order.id)}</div>
            <div><span>Product</span>${escapeHtml(product.name || "-")}</div>
            <div><span>Email / username</span><span class="claim-file">${escapeHtml(login || "-")}</span></div>
            <div><span>Password</span><span class="claim-file">${escapeHtml(password || "-")}</span></div>
          </div>
          <div class="claim-actions">
            <button class="page-link active" type="button" onclick="copyAccountDelivery('${order.id}')">Copy credentials</button>
            <button class="ghost-button" type="button" onclick="reportProblem('${order.id}')">Issue / Discord ticket</button>
            <a class="ghost-button" href="orders.html">Back to My Orders</a>
          </div>
          <div id="claimProblemStatus" class="claim-status"></div>
        `;
        return;
      }

      if (product.fulfillment === "script") {
        const scriptLocation = order.scriptLocation || product.scriptLocation || "ReplicatedStorage";
        const scriptClass = order.scriptClass || product.scriptClass || "ModuleScript";
        content.innerHTML = `
          <p class="eyebrow">Script available</p>
          <h1>Claim Script</h1>
          <div class="claim-meta">
            <div><span>Order ID</span>${escapeHtml(order.id)}</div>
            <div><span>Product</span>${escapeHtml(product.name || "-")}</div>
            <div><span>Put it in</span><span class="claim-file">${escapeHtml(scriptLocation)}</span></div>
            <div><span>Script type</span><span class="claim-file">${escapeHtml(scriptClass)}</span></div>
          </div>
          <div class="claim-actions">
            <button class="page-link active" type="button" onclick="copyScriptDelivery('${order.id}')">Copy script instructions</button>
            <button class="ghost-button" type="button" onclick="reportProblem('${order.id}')">Issue / Discord ticket</button>
            <a class="ghost-button" href="orders.html">Back to My Orders</a>
          </div>
          <div id="claimProblemStatus" class="claim-status"></div>
        `;
        return;
      }

      if (product.fulfillment === "key" || product.id === "codes") {
        content.innerHTML = `
          <p class="eyebrow">Key available</p>
          <h1>Claim Key</h1>
          <div class="claim-meta">
            <div><span>Order ID</span>${order.id}</div>
            <div><span>Product</span>${product.name || "-"}</div>
            <div><span>Status</span>${order.status}</div>
            <div><span>Key</span><span class="claim-file">${assignedKeys.join(", ") || "No key attached"}</span></div>
          </div>
          <div class="claim-actions">
            <button class="page-link active" type="button" onclick="navigator.clipboard.writeText('${assignedKeys.join("\\n")}')">Copy key</button>
            <button class="ghost-button" type="button" onclick="reportProblem('${order.id}')">Issue / Discord ticket</button>
            <a class="ghost-button" href="orders.html">Back to My Orders</a>
          </div>
          <div id="claimProblemStatus" class="claim-status"></div>
        `;
        return;
      }

      const rewardFile = order.rewardFile || product.rewardFile || DEFAULT_REWARD_FILE;
      const rewardHref = encodeURI(rewardFile);
      content.innerHTML = `
        <p class="eyebrow">Reward available</p>
        <h1>Claim Reward</h1>
        <div class="claim-meta">
          <div><span>Order ID</span>${order.id}</div>
          <div><span>Product</span>${product.name || "-"}</div>
          <div><span>Status</span>${order.status}</div>
          <div><span>File</span><span class="claim-file">${rewardFile}</span></div>
        </div>
        <div class="claim-actions">
          <a class="page-link active" href="${rewardHref}" download>Download reward</a>
          <button class="ghost-button" type="button" onclick="reportProblem('${order.id}')">Issue / Discord ticket</button>
          <a class="ghost-button" href="orders.html">Back to My Orders</a>
        </div>
        <div id="claimProblemStatus" class="claim-status"></div>
      `;
    }

    renderClaim();
  </script>
</body>
</html>
